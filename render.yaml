# Render Infrastructure-as-Code
# Deploy all three services from this single file.
# Documentation: https://render.com/docs/yaml-spec

services:
  # ── API (Web Service) ────────────────────────────────────────────────────
  - type: web
    name: rzf-api
    runtime: node
    plan: starter
    region: ohio
    buildCommand: pnpm install && pnpm --filter @rzf/db db:generate && pnpm --filter @rzf/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rzf-db
          property: connectionString
      - key: REDIS_URL
        sync: false  # Set manually from Render Key Value internal URL
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: API_BASE_URL
        value: https://rzf-api.onrender.com
      - key: CORS_ORIGIN
        sync: false  # Set to comma-separated Vercel URLs e.g. https://rzf-rostermind.vercel.app,https://rzf-directory.vercel.app
      - key: WORKER_CONCURRENCY
        value: "5"

  # ── Worker (Background Worker) ───────────────────────────────────────────
  - type: worker
    name: rzf-worker
    runtime: node
    plan: starter
    region: ohio
    buildCommand: pnpm install && pnpm --filter @rzf/db db:generate && pnpm --filter @rzf/worker build
    startCommand: node apps/worker/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rzf-db
          property: connectionString
      - key: REDIS_URL
        sync: false  # Set manually from Render Key Value internal URL
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WORKER_CONCURRENCY
        value: "5"

databases:
  # ── Postgres ─────────────────────────────────────────────────────────────
  - name: rzf-db
    plan: basic-256mb
    region: ohio
    databaseName: rzf_prod
    user: rzf
